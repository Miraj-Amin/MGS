<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGS — Events</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f7f5f0;color:#2c3319;min-height:100vh;-webkit-font-smoothing:antialiased}
.container{max-width:480px;margin:0 auto;padding:16px}
.section-label{font-size:11px;font-weight:700;color:#8b9474;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:14px;border:1px solid #e8e4dc;animation:fadeUp .4s ease both;transition:border-color .2s}
.card:hover{border-color:#c5cdb8}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.event-name{font-family:'DM Serif Display',Georgia,serif;font-size:19px;margin-bottom:3px;line-height:1.2}
.event-course{font-size:13px;color:#8b9474;font-weight:500}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;letter-spacing:.3px;white-space:nowrap}
.badge-open{background:#f0fdf4;color:#16a34a}
.badge-full{background:#fef2f2;color:#dc2626}
.badge-upcoming{background:#fffbeb;color:#d97706}
.meta{display:flex;gap:14px;font-size:12.5px;color:#8b9474;margin-bottom:14px;flex-wrap:wrap}
.card-footer{display:flex;align-items:center;justify-content:space-between}
.capacity-info{font-size:12px;color:#8b9474;margin-bottom:5px}
.capacity-bar{height:6px;border-radius:3px;background:#e8e4dc;width:130px;overflow:hidden}
.capacity-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#2d5016,#5a8a32)}
.price{font-family:'DM Serif Display',Georgia,serif;font-size:22px;color:#2d5016}
.countdown{display:inline-flex;align-items:center;gap:6px;background:#fafaf7;padding:6px 12px;border-radius:8px;font-size:12px;color:#8b9474;margin-top:10px;border:1px solid #e8e4dc}
.countdown strong{color:#2d5016;font-family:'DM Serif Display',Georgia,serif;font-size:16px}
.past{opacity:.55}
.past .event-name{color:#8b9474}
.loading{text-align:center;padding:40px;color:#8b9474}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="container">
<div class="section-label">2026 Season</div>
<div id="app"><div class="loading">Loading...</div></div>
</div>
<script>
const SHEET_ID = "18mtEHX_sWqI_9eLZLHmLuJgqLbzH_GlbFDOy1dYJnX4";

async function fetchSheet(tab) {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(tab)}`;
    const res = await fetch(url);
    const text = await res.text();
    const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/);
    if (!m) return null;
    const json = JSON.parse(m[1]);
    const cols = json.table.cols.map(c => c.label.trim().toLowerCase().replace(/\s+/g,'_'));
    return json.table.rows.map(row => {
      const obj = {};
      row.c.forEach((cell, i) => {
        if (!cols[i]) return;
        let val = '';
        if (cell && cell.v !== null && cell.v !== undefined) {
          if (typeof cell.v === 'string' && cell.v.startsWith('Date(')) {
            const p = cell.v.match(/Date\((\d+),(\d+),(\d+)/);
            if (p) val = `${p[1]}-${String(parseInt(p[2])+1).padStart(2,'0')}-${p[3].padStart(2,'0')}`;
          } else { val = String(cell.v); }
        } else if (cell && cell.f) { val = cell.f; }
        obj[cols[i]] = val;
      });
      return obj;
    });
  } catch(e) { console.error(tab, e); return null; }
}

function gv(obj,...keys){for(const k of keys) if(obj[k]!==undefined&&obj[k]!=='') return obj[k]; return '';}

function formatDate(d) {
  if (!d) return '';
  const date = parseDate(d);
  if (!date||isNaN(date)) return d;
  return date.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function parseDate(d) {
  if (!d) return null;
  if (d.includes('-')) return new Date(d+'T00:00:00');
  if (d.includes('/')) { const p=d.split('/'); return new Date(`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}T00:00:00`); }
  return new Date(d);
}
function daysUntil(d) { const dt=parseDate(d); if(!dt||isNaN(dt)) return -1; return Math.ceil((dt-new Date())/86400000); }

function render(data) {
  if (!data||!data.length) { document.getElementById('app').innerHTML='<div class="loading">No events found</div>'; return; }

  const sorted = [...data].sort((a,b) => {
    const da=parseDate(gv(a,'date','event_date')), db=parseDate(gv(b,'date','event_date'));
    return (da||0)-(db||0);
  });

  document.getElementById('app').innerHTML = sorted.map((ev, i) => {
    const en=gv(ev,'event_name','name','event','title');
    const co=gv(ev,'course','venue','location');
    const da=gv(ev,'date','event_date');
    const ti=gv(ev,'time','tee_time','start_time');
    const fm=gv(ev,'format','competition','type','game_format');
    const sp=parseInt(gv(ev,'spots','spaces','capacity','max'))||0;
    const tk=parseInt(gv(ev,'taken','signed_up','registered','booked','players'))||0;
    const pr=gv(ev,'price','cost','fee');
    const st=gv(ev,'status').toLowerCase();

    const days = daysUntil(da);
    const isPast = days < 0;
    const isFull = st==='full'||(sp>0&&tk>=sp);
    const pct = sp>0?Math.min((tk/sp)*100,100):0;

    let badgeCls='badge-open', badgeTxt='Open';
    if(isFull){badgeCls='badge-full';badgeTxt='Full';}
    else if(isPast){badgeCls='badge-full';badgeTxt='Played';}
    else if(days>=0&&days<=14){badgeCls='badge-upcoming';badgeTxt='Soon';}

    return `
      <div class="card ${isPast?'past':''}" style="animation-delay:${i*.06}s">
        <div class="card-header">
          <div><div class="event-name">${en}</div><div class="event-course">${co}</div></div>
          <span class="badge ${badgeCls}">${badgeTxt}</span>
        </div>
        <div class="meta">
          <span>📅 ${formatDate(da)}</span>
          ${ti?`<span>⏰ ${ti}</span>`:''}
          ${fm?`<span>🏌️ ${fm}</span>`:''}
        </div>
        <div class="card-footer">
          <div>
            ${sp?`<div class="capacity-info">${tk}/${sp} players${pr?' · £'+pr+'pp':''}</div><div class="capacity-bar"><div class="capacity-fill" style="width:${pct}%"></div></div>`:''}
          </div>
          ${pr?`<div class="price">£${pr}</div>`:''}
        </div>
        ${!isPast&&days>=0?`<div class="countdown"><strong>${days}</strong> day${days!==1?'s':''} to go</div>`:''}
      </div>`;
  }).join('');
}

async function init() {
  const data = await fetchSheet('Events');
  render(data);
}
init();
</script>
</body>
</html>
