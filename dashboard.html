<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MGS — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#f7f5f0;color:#2c3319;min-height:100vh;-webkit-font-smoothing:antialiased}
.container{max-width:480px;margin:0 auto;padding:16px}
.header{background:#2d5016;padding:18px 20px;position:relative;overflow:hidden}
.header::after{content:'';position:absolute;top:0;left:0;right:0;bottom:0;opacity:.06;background-image:repeating-linear-gradient(45deg,transparent,transparent 20px,#fff 20px,#fff 21px)}
.header-inner{position:relative;display:flex;align-items:center;justify-content:space-between}
.header h1{font-family:'DM Serif Display',Georgia,serif;font-size:24px;color:#fff;letter-spacing:-.5px;line-height:1.1}
.header .subtitle{font-size:11px;color:#c5cdb8;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin-top:2px}
.header .badge-icon{width:42px;height:42px;border-radius:50%;background:#3a6a1e;display:flex;align-items:center;justify-content:center;font-size:18px;border:2px solid #4a7a2e}
.hero{background:linear-gradient(135deg,#2d5016,#1a3a0a);color:#fff;border-radius:16px;padding:22px;margin-bottom:14px;position:relative;overflow:hidden;animation:fadeUp .5s ease}
.hero::after{content:'⛳';position:absolute;top:-20px;right:-20px;font-size:100px;opacity:.06}
.hero .label{font-size:12px;font-weight:600;color:#c5cdb8;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px}
.hero h2{font-family:'DM Serif Display',Georgia,serif;font-size:22px;margin-bottom:4px;position:relative}
.hero .course{font-size:14px;color:#b8c9a0;margin-bottom:12px}
.hero .meta{display:flex;gap:20px;font-size:13px;color:#c5cdb8}
.hero .bottom{margin-top:14px;display:flex;align-items:center;justify-content:space-between}
.hero .bottom .count{font-size:13px;color:#b8c9a0}
.hero .bottom .days{font-size:24px;font-family:'DM Serif Display',Georgia,serif;color:#d4a300}
.stats{display:flex;gap:10px;margin-bottom:14px}
.stat{text-align:center;padding:14px 8px;background:#fafaf7;border-radius:12px;flex:1;animation:fadeUp .4s ease both;border:1px solid #e8e4dc}
.stat:nth-child(2){animation-delay:.05s}
.stat:nth-child(3){animation-delay:.1s}
.stat-val{font-family:'DM Serif Display',Georgia,serif;font-size:26px;color:#2d5016}
.stat-label{font-size:11px;color:#8b9474;font-weight:500;margin-top:2px;letter-spacing:.3px}
.card{background:#fff;border-radius:16px;padding:20px;margin-bottom:14px;border:1px solid #e8e4dc;animation:fadeUp .4s ease both}
.card-title{font-size:12px;font-weight:700;color:#2d5016;margin-bottom:14px;letter-spacing:.5px;text-transform:uppercase}
.result-row{display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0ede6}
.result-row:last-child{border-bottom:none}
.pos{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'DM Serif Display',Georgia,serif;font-size:15px;font-weight:600;flex-shrink:0}
.pos-1{background:#d4a300;color:#fff}
.pos-2{background:#8a8a8a;color:#fff}
.pos-3{background:#a0522d;color:#fff}
.pos-other{border:1.5px solid #c5cdb8;color:#8b9474;font-size:14px}
.result-info{flex:1;margin-left:12px}
.result-name{font-size:14px;font-weight:600}
.result-hcp{font-size:12px;color:#8b9474}
.result-pts{font-family:'DM Serif Display',Georgia,serif;font-size:20px;color:#2d5016}
.trend-up{color:#16a34a;font-size:12px;font-weight:700;margin-left:8px}
.trend-down{color:#dc2626;font-size:12px;font-weight:700;margin-left:8px}
.trend-same{color:#9ca3af;font-size:10px;margin-left:8px}
.loading{text-align:center;padding:40px;color:#8b9474;font-size:14px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="header"><div class="header-inner"><div><h1>Millennium</h1><div class="subtitle">Golf Society</div></div><div class="badge-icon">⛳</div></div></div>
<div class="container" id="app"><div class="loading">Loading...</div></div>
<script>
const SHEET_ID = "18mtEHX_sWqI_9eLZLHmLuJgqLbzH_GlbFDOy1dYJnX4";

async function fetchSheet(tab) {
  try {
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(tab)}`;
    const res = await fetch(url);
    const text = await res.text();
    const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/);
    if (!m) return null;
    const json = JSON.parse(m[1]);
    const cols = json.table.cols.map(c => c.label.trim().toLowerCase().replace(/\s+/g,'_'));
    return json.table.rows.map(row => {
      const obj = {};
      row.c.forEach((cell, i) => {
        if (!cols[i]) return;
        let val = '';
        if (cell && cell.v !== null && cell.v !== undefined) {
          if (typeof cell.v === 'string' && cell.v.startsWith('Date(')) {
            const p = cell.v.match(/Date\((\d+),(\d+),(\d+)/);
            if (p) val = `${p[1]}-${String(parseInt(p[2])+1).padStart(2,'0')}-${p[3].padStart(2,'0')}`;
          } else { val = String(cell.v); }
        } else if (cell && cell.f) { val = cell.f; }
        obj[cols[i]] = val;
      });
      return obj;
    });
  } catch(e) { console.error(tab, e); return null; }
}

function g(obj) { return function(...keys) { for (const k of keys) if (obj[k] !== undefined && obj[k] !== '') return obj[k]; return ''; }; }

function formatDate(d) {
  if (!d) return '';
  const date = parseDate(d);
  if (!date || isNaN(date)) return d;
  return date.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
}
function parseDate(d) {
  if (!d) return null;
  if (d.includes('-')) return new Date(d+'T00:00:00');
  if (d.includes('/')) { const p=d.split('/'); return new Date(`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}T00:00:00`); }
  return new Date(d);
}
function daysUntil(d) { const dt=parseDate(d); if(!dt||isNaN(dt)) return 0; return Math.max(0,Math.ceil((dt-new Date())/86400000)); }
function trendHTML(t) { if(t==='up') return '<span class="trend-up">▲</span>'; if(t==='down') return '<span class="trend-down">▼</span>'; return '<span class="trend-same">●</span>'; }
function posClass(p) { const n=parseInt(p); if(n===1) return 'pos pos-1'; if(n===2) return 'pos pos-2'; if(n===3) return 'pos pos-3'; return 'pos pos-other'; }

async function init() {
  const [cfgRows, evRows, lbRows] = await Promise.all([fetchSheet('Config'),fetchSheet('Events'),fetchSheet('Leaderboard')]);

  const config = {};
  if (cfgRows) cfgRows.forEach(r => { const gv=g(r); const k=gv('key','setting','name','field'); const v=gv('value','val','data'); if(k) config[k.trim().toLowerCase().replace(/\s+/g,'_')]=v; });

  const events = evRows || [];
  const lb = lbRows || [];
  const now = new Date();
  const nextEv = events.find(e => { const d=parseDate(g(e)('date','event_date')); return d&&d>=now; }) || events[0];

  const mc = config.member_count||config.members||'—';
  const ec = config.events_count||config.events||'—';
  const ah = config.avg_handicap||config.average_handicap||'—';
  const le = config.last_event_name||config.last_event||'Last event';

  let heroHTML = '';
  if (nextEv) {
    const gv=g(nextEv);
    const en=gv('event_name','name','event','title');
    const co=gv('course','venue','location');
    const da=gv('date','event_date');
    const ti=gv('time','tee_time','start_time');
    const sp=gv('spots','spaces','capacity','max');
    const tk=gv('taken','signed_up','registered','booked','players');
    heroHTML = `<div class="hero"><div class="label">Next event</div><h2>${en}</h2><div class="course">${co}</div><div class="meta"><span>${formatDate(da)}</span>${ti?`<span>${ti} tee off</span>`:''}</div><div class="bottom"><span class="count">${sp&&tk?tk+'/'+sp+' signed up':''}</span>${da?`<span class="days">${daysUntil(da)} days</span>`:''}</div></div>`;
  }

  const lbHTML = lb.slice(0,5).map(p => {
    const gv=g(p);
    const pos=gv('position','pos','rank','#');
    const nm=gv('name','player','player_name');
    const hc=gv('handicap','hcp');
    const pt=gv('points','pts','score','total');
    const tr=gv('trend','movement');
    return `<div class="result-row"><div class="${posClass(pos)}">${pos}</div><div class="result-info"><div class="result-name">${nm}</div><div class="result-hcp">HCP ${hc}</div></div><div class="result-pts">${pt}</div>${trendHTML(tr)}</div>`;
  }).join('');

  document.getElementById('app').innerHTML = `
    ${heroHTML}
    <div class="stats"><div class="stat"><div class="stat-val">${mc}</div><div class="stat-label">Members</div></div><div class="stat"><div class="stat-val">${ec}</div><div class="stat-label">Events 2026</div></div><div class="stat"><div class="stat-val">${ah}</div><div class="stat-label">Avg handicap</div></div></div>
    ${lbHTML?`<div class="card" style="animation-delay:.15s"><div class="card-title">Latest results — ${le}</div>${lbHTML}</div>`:''}
  `;
}
init();
</script>
</body>
</html>
